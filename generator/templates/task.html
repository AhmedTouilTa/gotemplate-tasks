{{define "task"}}
<li class="task{{if .Done}} done{{end}}">
	<span class="status {{if .Done}}done{{else}}pending{{end}}">{{if .Done}}✓ done{{else}}○ pending{{end}}</span>
	<div class="name">{{.Name}}</div>
	{{if .Description}}<div class="desc">{{.Description}}</div>{{end}}
	<form class="inline" method="post" action="/update-task">
		<input type="hidden" name="ID" value="{{.ID}}">
		<input type="hidden" name="Done" value="{{if .Done}}false{{else}}true{{end}}">
		<button type="submit">{{if .Done}}Mark pending{{else}}Mark done{{end}}</button>
	</form>
	<form class="inline" method="post" action="/delete-task?id={{.ID}}">
		<button type="submit">Delete</button>
	</form>
</li>
{{end}}

{{define "content"}}
	{{if ".Task"}}
	<li class="task{{if .Task.Done}} done{{end}}">
		<span class="status {{if .Task.Done}}done{{else}}pending{{end}}">{{if .Task.Done}}✓ done{{else}}○ pending{{end}}</span>
		<div class="name">{{.Task.Name}}</div>
		{{if .Task.Description}}<div class="desc">{{.Task.Description}}</div>{{end}}
		<form class="inline" method="post" action="/update-task">
			<input type="hidden" name="ID" value="{{.Task.ID}}">
			<input type="hidden" name="Done" value="{{if .Task.Done}}false{{else}}true{{end}}">
			<button type="submit">{{if .Task.Done}}Mark pending{{else}}Mark done{{end}}</button>
		</form>
		<form class="inline" method="post" action="/delete-task?id={{.Task.ID}}">
			<button type="submit">Delete</button>
		</form>
	</li>
	{{end}}
{{end}}
